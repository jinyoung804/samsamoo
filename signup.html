<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
        }

        .signup-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .main-title {
            position: relative;
            z-index: 2;
            font-size: 7rem;
            font-weight: 900;
            color: #cb3a27;
            letter-spacing: -2px;
            margin-left: 8.5%;
            user-select: none;
        }

        .signup-form {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-right: 5%;
            margin-top: 40px;
        }

        .input-field {
            width: 100%;
            height: 50px;
            border: 1px solid #d35446;
            border-radius: 12px;
            padding: 0 20px;
            font-size: 16px;
            outline: none;
            background-color: #ffffff;
            color: #333333;
        }

        .submit-btn {
            width: 100%;
            height: 54px;
            background-color: #cb3a27;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            letter-spacing: -0.5px;
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: #888888;
            text-decoration: none;
            margin-top: 5px;
            letter-spacing: -0.5px;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        
        <img src="image/회원가입.png" alt="배경화면" class="bg-image">
        
        <h1 class="main-title">회원가입</h1>
        
        <form class="signup-form" onsubmit="event.preventDefault();">
            <input type="text" class="input-field" required placeholder="이메일을 입력하세요">
            <input type="email" class="input-field" required placeholder="아이디를 입력하세요">
            <input type="password" class="input-field" required placeholder="비밀번호를 입력하세요">
            
            <button type="submit" class="submit-btn">회원가입</button>
            
            <a href="#" class="login-link">이미 계정이 있으신가요?</a>
        </form>

    </div>

</body>
</html>
