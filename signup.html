<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #ffffff;
        font-family: "Malgun Gothic", sans-serif;
      }

      img {
        display: block;
        width: 350px;
        margin-bottom: 90px;
      }

      input {
        display: block;
        width: 600px;
        height: 50px;
        margin-bottom: 15px;
        border: 0.5px solid #3b3b39;
        border-radius: 12px;
        padding-left: 20px;
        box-sizing: border-box;
        font-size: 16px;
        outline: none;
      }

      #login-btn {
        width: 600px;
        height: 65px;
        background-color: #02c75d;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 10px;
        margin-bottom: 20px;
      }

      .account-link {
        color: #888888;
        font-size: 14px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <img src="./img/image-Photoroom (24).png" alt="회원가입" />

    <input id="email" type="text" placeholder="이메일을 입력하세요" />
    <input id="username" type="text" placeholder="아이디를 입력하세요" />
    <input id="password" type="password" placeholder="비밀번호를 입력하세요" />

    <button id="login-btn">회원가입</button>

    <a href="signin.html" class="account-link">이미 계정이 있으신가요?</a>
  </body>
</html>
