<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Noto Sans KR", sans-serif;
      }

      body {
        min-height: 100vh;
        background-color: #ffffff;
        display: flex;
        flex-direction: column;
      }

      a {
        text-decoration: none;
        color: black;
      }

      button {
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      .header {
        display: flex;
        align-items: center;
        width: 100%;
        height: 100px;
        padding: 0 40px;
        border-bottom: 1px solid #e0e0e0;
      }

      #event {
        width: 230px;
        height: 50px;
        background-color: #1E73E6;
        font-size: 16px;
        margin-left: -16px;
        margin-top: 2px;
        color: #fff;
      }

      .week-navigation-bar {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 2px;
      }

      .week-selector-wrap {
        display: flex;
        align-items: center;
        gap: 60px;
      }

      .week-title {
        font-size: 24px;
        font-weight: 500;
        color: #000;
      }

      .auth {
        margin-left: auto;
        margin-right: 30px;
        margin-top: 0px;
        display: flex;
        gap: 50px;
        font-size: 16px;
      }

      .main-container {
        display: flex;
        flex: 1;
        padding-left: 0;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        width: 280px;
        border-right: 1px solid #e0e0e0;
        flex-shrink: 0;
      }

      .mini-calendar {
        width: 100%;
        padding: 25px 30px 10px 25px;
      }

      .mini-cal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        padding: 0 5px;
      }

      .mini-cal-header span {
        font-size: 22px;
        font-weight: bold;
        color: #000;
      }

      .arrow-btn {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #000;
        padding: 0 5px;
      }

      .mini-cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        row-gap: 20px;
        text-align: center;
        font-size: 16px;
      }

      .mini-cal-grid .day-name {
        font-weight: 500;
        color: #767676;
        margin-bottom: 5px;
      }

      .mini-cal-grid .date {
        cursor: pointer;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 500;
        color: #000;
        border-radius: 50%;
      }

      .mini-cal-grid .date.selected {
        background-color: #1E73E6;
        color: #fff;
      }

      .mini-cal-grid .day-name:first-child,
      .mini-cal-grid .day-name:last-child,
      .mini-cal-grid .date:nth-child(7n + 1),
      .mini-cal-grid .date:nth-child(7n),
      .mini-cal-grid .date.other-month {
        color: #9e9e9e;
      }

      #friend {
        font-size: 20px;
        font-weight: 500;
        padding-left: 20px;
        padding-top: 25px;
        margin-top: 15px;
        border-top: 1px solid #e0e0e0;
        width: 100%;
      }

      .content-view {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .timeline-scroll-container {
        flex: 1;
        overflow-y: auto;
        max-height: calc(100vh - 100px);
      }

      .timeline-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .timeline-table th,
      .timeline-table td {
        border: none;
        box-shadow: 0 0 0 0.5px #e0e0e0;
        text-align: center;
        vertical-align: middle;
      }

      .timeline-table thead th {
        height: 60px;
        background-color: #ffffff;
        font-size: 16px;
        font-weight: 400;
        color: #333333;
      }

      .timeline-table thead th.empty-corner {
        width: 10%;
      }

      .timeline-table td.time-col-cell {
        font-size: 16px;
        font-weight: 400;
        color: #555555;
        background-color: #ffffff;
        width: 10%;
      }

      .timeline-table td.sched-cell {
        height: 60px;
        background-color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <button id="event" onclick="event">일정추가</button>

      <div class="week-navigation-bar">
        <div class="week-selector-wrap">
          <button
            class="arrow-btn"
            id="prev-week"
            style="font-size: 26px"
          ></button>
          <div class="week-title" id="main-week-title">11월 4주</div>
          <button
            class="arrow-btn"
            id="next-week"
            style="font-size: 26px"
          ></button>
        </div>
      </div>

      <div class="auth">
        <p id="signUp"><a href="signup.html">회원가입</a></p>
        <p id="signIn"><a href="signin.html">로그인</a></p>
      </div>
    </div>

    <div class="main-container">
      <div class="sidebar">
        <div class="mini-calendar">
          <div class="mini-cal-header">
            <button class="arrow-btn" id="prev-mini"></button>
            <span id="mini-month-title">11월</span>
            <button class="arrow-btn" id="next-mini"></button>
          </div>
          <div class="mini-cal-grid" id="mini-dates-grid">
            <div class="day-name">일</div>
            <div class="day-name">월</div>
            <div class="day-name">화</div>
            <div class="day-name">수</div>
            <div class="day-name">목</div>
            <div class="day-name">금</div>
            <div class="day-name">토</div>
          </div>
        </div>

        <p id="friend">친구</p>
      </div>

      <div class="content-view">
        <div class="timeline-scroll-container">
          <table class="timeline-table">
            <thead>
              <tr>
                <th class="empty-corner"></th>
                <th id="day-0">-</th>
                <th id="day-1">-</th>
                <th id="day-2">-</th>
                <th id="day-3">-</th>
                <th id="day-4">-</th>
                <th id="day-5">-</th>
                <th id="day-6">-</th>
              </tr>
            </thead>
            <tbody id="timeline-hours-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      let currentDate = new Date();

      const miniMonthTitle = document.getElementById("mini-month-title");
      const miniDatesGrid = document.getElementById("mini-dates-grid");
      const mainWeekTitle = document.getElementById("main-week-title");
      const timelineHoursBody = document.getElementById("timeline-hours-body");

      function renderTimeline() {
        timelineHoursBody.innerHTML = "";
        for (let hour = 0; hour <= 24; hour++) {
          const tr = document.createElement("tr");

          const tdTime = document.createElement("td");
          tdTime.classList.add("time-col-cell");
          tdTime.textContent = String(hour).padStart(2, "0");
          tr.appendChild(tdTime);

          for (let day = 0; day < 7; day++) {
            const tdSched = document.createElement("td");
            tdSched.classList.add("sched-cell");
            tr.appendChild(tdSched);
          }

          timelineHoursBody.appendChild(tr);
        }
      }

      function updateWeekDaysHeaders(selectedDate) {
        const currentDayOfWeek = selectedDate.getDay();

        const sundayDate = new Date(selectedDate);
        sundayDate.setDate(selectedDate.getDate() - currentDayOfWeek);

        for (let i = 0; i < 7; i++) {
          const loopDate = new Date(sundayDate);
          loopDate.setDate(sundayDate.getDate() + i);

          const targetHeader = document.getElementById(`day-${i}`);
          if (targetHeader) {
            targetHeader.textContent = loopDate.getDate();
          }
        }
      }

      function getWeekOfMonth(date) {
        const firstDayOfMonth = new Date(
          date.getFullYear(),
          date.getMonth(),
          1,
        );
        const startDay = firstDayOfMonth.getDay();
        const currentDay = date.getDate();
        return Math.ceil((currentDay + startDay) / 7);
      }

      function renderCalendar() {
        const viewYear = currentDate.getFullYear();
        const viewMonth = currentDate.getMonth();

        miniMonthTitle.textContent = `${viewMonth + 1}월`;

        const miniDays = miniDatesGrid.querySelectorAll(".date");
        miniDays.forEach((day) => day.remove());

        const firstDayOfMonth = new Date(viewYear, viewMonth, 1);
        const lastDate = new Date(viewYear, viewMonth + 1, 0).getDate();
        const startDayOfWeek = firstDayOfMonth.getDay();

        for (let i = 0; i < startDayOfWeek; i++) {
          const emptyMiniDiv = document.createElement("div");
          emptyMiniDiv.classList.add("date", "other-month");
          miniDatesGrid.appendChild(emptyMiniDiv);
        }

        for (let date = 1; date <= lastDate; date++) {
          const miniDiv = document.createElement("div");
          miniDiv.classList.add("date");
          miniDiv.textContent = date;

          if (
            date === currentDate.getDate() &&
            viewMonth === currentDate.getMonth() &&
            viewYear === currentDate.getFullYear()
          ) {
            miniDiv.classList.add("selected");
          }

          miniDiv.addEventListener("click", function () {
            const activeDate = miniDatesGrid.querySelector(".date.selected");
            if (activeDate) activeDate.classList.remove("selected");
            miniDiv.classList.add("selected");

            currentDate = new Date(viewYear, viewMonth, date);
            syncMainTimeline();
          });

          miniDatesGrid.appendChild(miniDiv);
        }

        const totalCells = startDayOfWeek + lastDate;
        const remainingCells = 42 - totalCells;
        for (let i = 0; i < remainingCells; i++) {
          const emptyMiniDiv = document.createElement("div");
          emptyMiniDiv.classList.add("date", "other-month");
          miniDatesGrid.appendChild(emptyMiniDiv);
        }
      }

      function syncMainTimeline() {
        const weekNum = getWeekOfMonth(currentDate);
        mainWeekTitle.textContent = `${currentDate.getMonth() + 1}월 ${weekNum}주`;
        updateWeekDaysHeaders(currentDate);
        renderCalendar();
      }

      function moveWeek(weeksToAdd) {
        currentDate.setDate(currentDate.getDate() + weeksToAdd * 7);
        syncMainTimeline();
      }

      function movePrevMonth() {
        const targetDate = new Date(currentDate);
        targetDate.setMonth(targetDate.getMonth() - 1);
        currentDate = targetDate;
        syncMainTimeline();
      }

      function moveNextMonth() {
        const targetDate = new Date(currentDate);
        targetDate.setMonth(targetDate.getMonth() + 1);
        currentDate = targetDate;
        syncMainTimeline();
      }

      document
        .getElementById("prev-mini")
        .addEventListener("click", movePrevMonth);
      document
        .getElementById("next-mini")
        .addEventListener("click", moveNextMonth);

      document
        .getElementById("prev-week")
        .addEventListener("click", () => moveWeek(-1));
      document
        .getElementById("next-week")
        .addEventListener("click", () => moveWeek(1));

      syncMainTimeline();
      renderTimeline();
    </script>
  </body>
</html>
