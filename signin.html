<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 페이지</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fff;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            padding: 40px;
            gap: 80px;
        }

        .title-area {
            flex: 0 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

       .title-area img {
            width: 24rem;
            object-fit: contain;
            margin-left: -40%;
        }

        .form-area {
            width: 450px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-field {
            width: 100%;
            height: 65px;
            border: 1px solid #1E73E6;
            border-radius: 12px;
            background-color: #FFFFFF;
            padding: 0 20px;
            font-size: 18px;
            outline: none;
        }

        .input-field::placeholder {
            color: #B5B5B5;
        }

        .submit-btn {
            width: 100%;
            height: 65px;
            border: none;
            border-radius: 12px;
            background-color: #0062D2;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 4px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #004FB0;
        }

        .footer-link {
            text-align: center;
            color: #7A7A7A;
            font-size: 15px;
            text-decoration: none;
            margin-top: 8px;
        }

        .footer-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
                gap: 40px;
            }

            .title-area img {
                width: 22rem;
                margin-left: 0;
            }

            .form-area {
                width: 100%;
                max-width: 450px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title-area">
            <img src="image/로그인.png" alt="로그인">
        </div>

        <form class="form-area" id="login-form">
            <input type="email" id="email" class="input-field" placeholder="이메일을 입력하세요" >
            <input type="password" id="password" class="input-field" placeholder="비밀번호를 입력하세요">

            <button type="submit" class="submit-btn">로그인</button>
        </form>
    </div>

    <script type="module">
        import { supabase } from './src/supabase.js';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Supabase Auth에 로그인 요청
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert('로그인 실패: ' + error.message);
            } else {
                alert('로그인 성공! 메인 화면으로 이동합니다.');
                window.location.href = 'main.html'; // 메인 일정 화면으로 이동
            }
        });
    </script>
</body>
</html>
